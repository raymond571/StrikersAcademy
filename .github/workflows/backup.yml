name: Database Backup

on:
  schedule:
    # Daily at 00:00 IST (18:30 UTC previous day)
    - cron: '30 18 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual backup'
        required: false
        default: 'Manual trigger'

jobs:
  backup:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Run backup on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 5m
          script: |
            echo "Running database backup..."
            echo "Reason: ${{ github.event.inputs.reason || 'Scheduled' }}"
            bash /var/www/strickersacademy/deployment/backup-db.sh
            echo ""
            echo "Local backups:"
            ls -lh /var/backups/strikersacademy/ | tail -5
