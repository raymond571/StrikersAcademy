# ─────────────────────────────────────────────────────────────
# Cloudflare Authenticated Origin Pulls
# Ensures only Cloudflare can reach your origin server.
#
# Setup:
#   1. Download the Cloudflare Origin Pull CA certificate from:
#      https://developers.cloudflare.com/ssl/origin-configuration/authenticated-origin-pull/set-up/zone-level/
#   2. Save it to /etc/ssl/cloudflare/cloudflare-origin-pull-ca.pem
#   3. In Cloudflare Dashboard → SSL/TLS → Origin Server →
#      enable "Authenticated Origin Pulls"
# ─────────────────────────────────────────────────────────────

ssl_client_certificate /etc/ssl/cloudflare/cloudflare-origin-pull-ca.pem;
ssl_verify_client on;
